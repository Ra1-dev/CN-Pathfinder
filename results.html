    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ruby:        #E0115F;
      --ruby-deep:   #A80D47;
      --ruby-soft:   #F24080;
      --ruby-dim:    rgba(224, 17, 95, 0.18);
      --void:        #06080F;
      --void-2:      #0D1018;
      --void-3:      #141720;
      --void-4:      #1C2030;
      --cream:       #F3E5AB;
      --cream-dim:   #D9C97A;
      --cream-ghost: rgba(243, 229, 171, 0.08);
      --slate:       #8B92A8;
      --slate-dim:   #555C72;
      --border:      rgba(243, 229, 171, 0.1);
      --border-mid:  rgba(243, 229, 171, 0.22);
      --reach-color:  #F24080;
      --match-color:  #E0A020;
      --safety-color: #2DBF7B;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; line-height: 1.65;
      color: var(--cream);
      background: var(--void);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Nav ─────────────────────────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1.5rem, 5vw, 3rem);
      height: 60px;
      background: rgba(6,8,15,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Lora', serif; font-size: 1.15rem; font-weight: 600;
      color: var(--cream); text-decoration: none;
      display: flex; align-items: center; gap: 8px;
    }

    .logo-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ruby); box-shadow: 0 0 7px var(--ruby);
    }

    .nav-tabs {
      display: flex; gap: 2px; list-style: none;
    }

    .nav-tab {
      font-size: 13px; padding: 6px 14px; border-radius: 7px;
      color: var(--slate); cursor: pointer;
      text-decoration: none; transition: all .15s;
    }

    .nav-tab:hover { color: var(--cream); background: var(--cream-ghost); }
    .nav-tab.active { color: var(--cream); background: var(--ruby-dim); }

    .nav-right { display: flex; align-items: center; gap: 10px; }

    .btn-sm {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      border-radius: 7px; padding: 6px 14px;
      cursor: pointer; text-decoration: none; transition: all .2s; border: none;
    }

    .btn-outline-sm {
      background: transparent; border: 1px solid var(--border-mid); color: var(--slate);
    }
    .btn-outline-sm:hover { color: var(--cream); background: var(--cream-ghost); }

    .btn-ruby-sm { background: var(--ruby); color: #fff; }
    .btn-ruby-sm:hover { background: var(--ruby-deep); }

    /* ── Page layout ─────────────────────────────────────── */
    .page { max-width: 900px; margin: 0 auto; padding: 2rem clamp(1rem, 4vw, 2.5rem) 4rem; }

    /* ── Profile bar ─────────────────────────────────────── */
    .profile-bar {
      background: var(--void-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 20px;
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      margin-bottom: 1.5rem;
    }

    .profile-bar-left { display: flex; align-items: center; gap: 12px; }

    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--ruby-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 500; color: var(--ruby-soft);
      flex-shrink: 0;
    }

    .profile-name { font-size: 15px; font-weight: 500; color: var(--cream); }
    .profile-meta { font-size: 12px; color: var(--slate); margin-top: 1px; }

    .profile-stats { display: flex; gap: 20px; }

    .pstat { text-align: right; }
    .pstat-val { font-size: 17px; font-weight: 500; color: var(--cream); }
    .pstat-label { font-size: 11px; color: var(--slate-dim); margin-top: 1px; }

    /* ── Alerts ──────────────────────────────────────────── */
    .alert {
      border-radius: 10px; padding: 12px 16px;
      font-size: 13px; line-height: 1.6;
      display: flex; gap: 10px; align-items: flex-start;
      margin-bottom: 10px;
    }

    .alert-warn {
      background: rgba(201,134,10,0.1);
      border: 1px solid rgba(201,134,10,0.3);
      color: #E0B84A;
    }

    .alert-info {
      background: rgba(224,17,95,0.08);
      border: 1px solid rgba(224,17,95,0.2);
      color: var(--ruby-soft);
    }

    .alert-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; flex-shrink: 0; margin-top: 5px;
    }

    /* ── Summary strip ───────────────────────────────────── */
    .summary-strip {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 1.5rem;
    }

    .sum-card {
      background: var(--void-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
    }

    .sum-num { font-size: 24px; font-weight: 500; line-height: 1; }
    .sum-num.reach  { color: var(--reach-color); }
    .sum-num.match  { color: var(--match-color); }
    .sum-num.safety { color: var(--safety-color); }
    .sum-label { font-size: 11px; color: var(--slate-dim); margin-top: 5px; }

    /* ── Filter row ──────────────────────────────────────── */
    .filter-row {
      display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 1.25rem;
      align-items: center;
    }

    .filter-chip {
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 12px; cursor: pointer;
      color: var(--slate); background: var(--void-2);
      transition: all .15s; user-select: none;
    }

    .filter-chip:hover { border-color: var(--border-mid); color: var(--cream); }
    .filter-chip.on { background: var(--ruby-dim); border-color: var(--ruby); color: var(--ruby-soft); }

    .filter-sep { color: var(--slate-dim); font-size: 12px; margin: 0 4px; }

    /* ── School cards ────────────────────────────────────── */
    .school-card {
      background: var(--void-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color .15s;
      cursor: pointer;
    }

    .school-card:hover { border-color: var(--border-mid); }

    .school-card.reach  { border-left: 3px solid var(--reach-color); }
    .school-card.match  { border-left: 3px solid var(--match-color); }
    .school-card.safety { border-left: 3px solid var(--safety-color); }

    .card-main {
      padding: 16px 20px;
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 16px;
    }

    .card-left { flex: 1; min-width: 0; }

    .card-top-row {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap; margin-bottom: 3px;
    }

    .school-name {
      font-size: 15px; font-weight: 500; color: var(--cream);
    }

    .tier-tag {
      font-size: 11px; font-weight: 500;
      padding: 2px 8px; border-radius: 4px;
    }

    .tier-tag.reach  { background: rgba(242,64,128,.15); color: var(--reach-color); }
    .tier-tag.match  { background: rgba(224,160,32,.15); color: var(--match-color); }
    .tier-tag.safety { background: rgba(45,191,123,.15); color: var(--safety-color); }

    .school-loc { font-size: 12px; color: var(--slate-dim); margin-bottom: 8px; }

    .insight-row { display: flex; gap: 6px; flex-wrap: wrap; }

    .insight-pill {
      font-size: 11px; padding: 3px 9px; border-radius: 5px;
    }

    .ip-good { background: rgba(45,191,123,.12); color: #2DBF7B; }
    .ip-warn { background: rgba(224,160,32,.12); color: #E0A020; }
    .ip-info { background: rgba(243,229,171,.08); color: var(--slate); }

    .card-right {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 4px; flex-shrink: 0;
    }

    .chance-pct { font-size: 22px; font-weight: 500; line-height: 1; }
    .chance-pct.reach  { color: var(--reach-color); }
    .chance-pct.match  { color: var(--match-color); }
    .chance-pct.safety { color: var(--safety-color); }

    .chance-label { font-size: 11px; color: var(--slate-dim); }

    .bar-track {
      height: 3px; background: var(--void-4);
      border-radius: 2px; overflow: hidden;
      margin: 8px 0 0;
    }

    .bar-fill { height: 100%; border-radius: 2px; transition: width .8s ease; }
    .bar-fill.reach  { background: var(--reach-color); }
    .bar-fill.match  { background: var(--match-color); }
    .bar-fill.safety { background: var(--safety-color); }

    /* ── Expanded card ───────────────────────────────────── */
    .card-expand {
      display: none;
      padding: 0 20px 18px;
      border-top: 1px solid var(--border);
    }

    .school-card.open .card-expand { display: block; }

    .expand-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin: 14px 0;
    }

    .expand-block label {
      font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--slate-dim); display: block; margin-bottom: 5px;
    }

    .expand-block p {
      font-size: 13px; color: var(--slate); line-height: 1.65;
    }

    .expand-block p strong { color: var(--cream); font-weight: 500; }

    .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

    .btn-action {
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
      padding: 6px 13px; border-radius: 7px; cursor: pointer;
      transition: all .15s; text-decoration: none;
      display: inline-flex; align-items: center; gap: 5px;
    }

    .btn-action-primary {
      background: var(--ruby); color: #fff; border: none;
    }
    .btn-action-primary:hover { background: var(--ruby-deep); }

    .btn-action-ghost {
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--slate);
    }
    .btn-action-ghost:hover { color: var(--cream); border-color: var(--border-mid); background: var(--cream-ghost); }

    /* ── No profile state ────────────────────────────────── */
    .no-profile {
      text-align: center; padding: 5rem 2rem;
    }

    .no-profile h2 {
      font-family: 'Lora', serif; font-size: 1.8rem; font-weight: 600;
      color: var(--cream); margin-bottom: .75rem;
    }

    .no-profile p {
      font-size: 15px; color: var(--slate); margin-bottom: 2rem; line-height: 1.7;
    }

    .btn-lg {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      background: var(--ruby); color: #fff;
      border-radius: 10px; padding: .85rem 2rem;
      cursor: pointer; text-decoration: none; border: none; transition: all .2s;
    }
    .btn-lg:hover { background: var(--ruby-deep); }

    /* ── Section header ──────────────────────────────────── */
    .section-head {
      display: flex; align-items: baseline;
      justify-content: space-between; margin-bottom: 1rem;
    }

    .section-label {
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--slate-dim);
    }

    .section-count { font-size: 12px; color: var(--slate-dim); }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 600px) {
      .summary-strip { grid-template-columns: repeat(3,1fr); }
      .profile-stats { display: none; }
      .expand-grid { grid-template-columns: 1fr; }
      .nav-tabs { display: none; }
    }
  </style>

      const sat   = parseInt(profile.sat)   || 0;
      const act   = parseInt(profile.act)   || 0;
      const ib    = parseInt(profile.ib)    || 0;

      // Convert ACT/IB to SAT-equivalent if no SAT
      let effectiveSAT = sat;
      if (!sat && act)  effectiveSAT = Math.round(act * 40 + 560);
      if (!sat && !act && ib) effectiveSAT = Math.round((ib / 45) * 600 + 900);

      // --- GPA score (0-40 pts) ---
      let gpaScore = 0;
      if (gpa >= school.medGPA + 0.3)  gpaScore = 40;
      else if (gpa >= school.medGPA)   gpaScore = 32;
      else if (gpa >= school.medGPA - 0.15) gpaScore = 24;
      else if (gpa >= school.medGPA - 0.3)  gpaScore = 14;
      else if (gpa >= school.medGPA - 0.5)  gpaScore = 6;
      else gpaScore = 0;

      // --- SAT score (0-35 pts) ---
      let satScore = 0;
      if (!effectiveSAT) {
        // test-optional penalty — modest, not catastrophic
        satScore = 12;
      } else if (effectiveSAT >= school.medSAT + 60)  satScore = 35;
      else if (effectiveSAT >= school.medSAT)          satScore = 28;
      else if (effectiveSAT >= school.medSAT - 60)     satScore = 20;
      else if (effectiveSAT >= school.medSAT - 120)    satScore = 12;
      else if (effectiveSAT >= school.medSAT - 200)    satScore = 5;
      else satScore = 0;

      // --- Major fit (0-10 pts) ---
      let majorScore = 0;
      if (profile.majors && profile.majors.length) {
        const overlap = profile.majors.filter(m => school.strongMajors.includes(m));
        majorScore = Math.min(overlap.length * 5, 10);
      } else {
        majorScore = 5; // undecided — neutral
      }

      // --- Activities (0-8 pts) ---
      const actCount = (profile.activities || []).filter(a => a.name).length;
      const actScore = Math.min(actCount * 2, 8);

      // --- Essay presence (0-5 pts) ---
      const essayScore = (profile.personalStatement && profile.personalStatement.length > 100) ? 5 : 0;

      // --- International penalty (-5 to -15 pts) ---
      // International applicants compete in a smaller, harder pool
      const intlPenalty = school.intlPct < 6 ? -15 : school.intlPct < 10 ? -10 : -5;

      // --- Budget mismatch penalty ---
      let budgetPenalty = 0;
      const budget = profile.budget || '';
      if (budget.includes('Under $20,000') && !school.intlAid) budgetPenalty = -10;
      else if (budget.includes('$20,000') && !school.intlAid && school.tuition > 50000) budgetPenalty = -5;

      // --- First gen boost ---
      const firstGenBoost = profile.firstGen === 'yes' ? 3 : 0;

      // Total
      const raw = gpaScore + satScore + majorScore + actScore + essayScore + intlPenalty + budgetPenalty + firstGenBoost;

      // Map to percentage with tier anchoring
      let base = 0;
      if (school.baseTier === 'reach')  base = 8;
      if (school.baseTier === 'match')  base = 30;
      if (school.baseTier === 'safety') base = 65;

      const maxAdd = school.baseTier === 'reach' ? 22 : school.baseTier === 'match' ? 35 : 25;
      const totalPossible = 40 + 35 + 10 + 8 + 5; // max raw
      const pct = base + Math.round((raw / totalPossible) * maxAdd);

      // Clamp sensibly
      const min = school.baseTier === 'reach' ? 4 : school.baseTier === 'match' ? 10 : 40;
      const max = school.baseTier === 'reach' ? 30 : school.baseTier === 'match' ? 70 : 92;
      return Math.min(max, Math.max(min, pct));
    }

    // ─────────────────────────────────────────────────────
    // TIER ASSIGNMENT
    // Re-tiers based on calculated chance, overriding base
    // ─────────────────────────────────────────────────────
    function getTier(chance) {
      if (chance >= 55) return 'safety';
      if (chance >= 22) return 'match';
      return 'reach';
    }

    // ─────────────────────────────────────────────────────
    // FILTER LOGIC
    // ─────────────────────────────────────────────────────
    let activeFilter = 'all';
    let schoolResults = [];

    function setFilter(f) {
      activeFilter = f;
      document.querySelectorAll('.filter-chip').forEach(c => {
        c.classList.toggle('on', c.dataset.filter === f);
      });
      renderCards();
    }

    // ─────────────────────────────────────────────────────
    // CARD EXPAND/COLLAPSE
    // ─────────────────────────────────────────────────────
    function toggleCard(id) {
      const card = document.getElementById(id);
      card.classList.toggle('open');
    }

    // ─────────────────────────────────────────────────────
    // RENDER
    // ─────────────────────────────────────────────────────
    function renderCards() {
      const list = document.getElementById('schoolList');
      const filtered = schoolResults.filter(s => {
        if (activeFilter === 'all')  return true;
        if (activeFilter === 'aid')  return s.school.intlAid;
        return s.tier === activeFilter;
      });

      const countEl = document.getElementById('schoolCount');
      if (countEl) countEl.textContent = filtered.length + ' schools';

      list.innerHTML = filtered.map(s => {
        const pillsHtml = s.school.insights.map(i =>
          `<span class="insight-pill ip-${i.type}">${i.text}</span>`
        ).join('');

        return `
        <div class="school-card ${s.tier}" id="card-${s.school.id}" onclick="toggleCard('card-${s.school.id}')">
          <div class="card-main">
            <div class="card-left">
              <div class="card-top-row">
                <span class="school-name">${s.school.name}</span>
                <span class="tier-tag ${s.tier}">${s.tier}</span>
              </div>
              <div class="school-loc">${s.school.loc} &nbsp;·&nbsp; ~$${Math.round(s.school.tuition/1000)}k/yr &nbsp;·&nbsp; ${s.school.intlPct}% intl</div>
              <div class="bar-track"><div class="bar-fill ${s.tier}" style="width:${s.chance}%"></div></div>
              <div class="insight-row" style="margin-top:8px;">${pillsHtml}</div>
            </div>
            <div class="card-right">
              <div class="chance-pct ${s.tier}">${s.chance}%</div>
              <div class="chance-label">your chance</div>
            </div>
          </div>
          <div class="card-expand">
            <div class="expand-grid">
              <div class="expand-block">
                <label>Why it fits you</label>
                <p>${s.school.whyFit}</p>
              </div>
              <div class="expand-block">
                <label>Financial aid</label>
                <p>${s.school.aidNote}</p>
              </div>
              <div class="expand-block">
                <label>Median admitted student</label>
                <p><strong>GPA ${s.school.medGPA}</strong> &nbsp;·&nbsp; <strong>SAT ${s.school.medSAT}</strong><br>You: GPA ${s.profileGPA} · SAT ${s.profileSAT}</p>
              </div>
              <div class="expand-block">
                <label>Your key action</label>
                <p>${s.school.keyAction}</p>
              </div>
            </div>
            <div class="expand-block" style="margin-bottom:10px;">
              <label>Deadlines</label>
              <p>${s.school.deadlines}</p>
            </div>
            <div class="action-row">
              <button class="btn-action btn-action-primary" onclick="event.stopPropagation()">
                Get advice for this school
              </button>
              <button class="btn-action btn-action-ghost" onclick="event.stopPropagation()">
                Essay prompts
              </button>
              <button class="btn-action btn-action-ghost" onclick="event.stopPropagation()">
                Add to timeline
              </button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    // ─────────────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────────────
    function init() {
      const raw = localStorage.getItem('admitly_profile');
      const page = document.getElementById('pageContent');

      if (!raw) {
        // No profile — show empty state
        page.innerHTML = `
          <div class="no-profile">
            <h2>No profile found</h2>
            <p>Complete your profile first so we can calculate your personalized school list and admission chances.</p>
            <a href="profile.html" class="btn-lg">Build my profile →</a>
          </div>`;
        return;
      }

      const profile = JSON.parse(raw);
      const gpa    = parseFloat(profile.gpa) || 0;
      const sat    = parseInt(profile.sat)   || 0;
      const name   = profile.firstName || 'Student';
      const initials = ((profile.firstName||'?')[0] + (profile.lastName||'?')[0]).toUpperCase();
      const majors = (profile.majors||[]).join(', ') || 'Undecided';
      const country = profile.country || 'International';
      const actCount = (profile.activities||[]).filter(a=>a.name).length;

      // Calculate chances for all schools
      schoolResults = SCHOOLS.map(school => {
        const chance = calcChance(school, profile);
        const tier   = getTier(chance);
        return {
          school,
          chance,
          tier,
          profileGPA: gpa || '—',
          profileSAT: sat || 'none'
        };
      }).sort((a, b) => b.chance - a.chance);

      const reachCount  = schoolResults.filter(s => s.tier === 'reach').length;
      const matchCount  = schoolResults.filter(s => s.tier === 'match').length;
      const safetyCount = schoolResults.filter(s => s.tier === 'safety').length;

      // Build alerts
      const alerts = [];
      if (!sat && !profile.act) {
        alerts.push({ type: 'warn', text: `<strong>No test score on file.</strong> Taking the SAT (aim for 1350+) could move you from reach to match at several schools. Your chances above assume test-optional.` });
      }
      if (!gpa) {
        alerts.push({ type: 'info', text: `<strong>GPA not entered.</strong> <a href="profile.html" style="color:var(--ruby-soft)">Add your GPA</a> to get more accurate chance scores.` });
      }

      const alertsHtml = alerts.map(a => `
        <div class="alert alert-${a.type}">
          <span class="alert-dot"></span>
          <div>${a.text}</div>
        </div>`).join('');

      page.innerHTML = `
        <div class="profile-bar">
          <div class="profile-bar-left">
            <div class="avatar">${initials}</div>
            <div>
              <div class="profile-name">${name} — ${country}</div>
              <div class="profile-meta">${profile.grade||'High school'} · ${majors} · ${profile.budget||'Budget not set'}</div>
            </div>
          </div>
          <div class="profile-stats">
            <div class="pstat"><div class="pstat-val">${gpa||'—'}</div><div class="pstat-label">GPA</div></div>
            <div class="pstat"><div class="pstat-val">${sat||'—'}</div><div class="pstat-label">SAT</div></div>
            <div class="pstat"><div class="pstat-val">${actCount}</div><div class="pstat-label">Activities</div></div>
            <div class="pstat"><div class="pstat-val">${schoolResults.length}</div><div class="pstat-label">Schools</div></div>
          </div>
        </div>

        ${alertsHtml}

        <div class="summary-strip">
          <div class="sum-card"><div class="sum-num reach">${reachCount}</div><div class="sum-label">Reach schools</div></div>
          <div class="sum-card"><div class="sum-num match">${matchCount}</div><div class="sum-label">Match schools</div></div>
          <div class="sum-card"><div class="sum-num safety">${safetyCount}</div><div class="sum-label">Safety schools</div></div>
        </div>

        <div class="filter-row">
          <div class="filter-chip on" data-filter="all" onclick="setFilter('all')">All schools</div>
          <div class="filter-chip" data-filter="reach"  onclick="setFilter('reach')">Reach</div>
          <div class="filter-chip" data-filter="match"  onclick="setFilter('match')">Match</div>
          <div class="filter-chip" data-filter="safety" onclick="setFilter('safety')">Safety</div>
          <span class="filter-sep">·</span>
          <div class="filter-chip" data-filter="aid" onclick="setFilter('aid')">Gives intl aid</div>
        </div>

        <div class="section-head">
          <span class="section-label">Your personalized list</span>
          <span class="section-count" id="schoolCount">${schoolResults.length} schools</span>
        </div>

        <div id="schoolList"></div>

        <p style="font-size:12px;color:var(--slate-dim);margin-top:1.5rem;line-height:1.6;">
          Chance scores are estimates based on your profile and historical international applicant data.
          They are not guarantees. Actual admission depends on essays, recommendations, and many factors
          not captured here — but this gives you an honest starting point.
        </p>
      `;

      renderCards();
    }

    init();
  </script>

</body>
