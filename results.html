<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UniJourney — Your School List</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
.results-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: calc(100vh - 64px);
}

/* ── Left panel: profile + filters ─── */
.left-panel {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 2rem 1.5rem;
  position: sticky; top: 64px;
  height: calc(100vh - 64px);
  overflow-y: auto;
}
.profile-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem;
}
.profile-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--pri-dim); display: flex;
  align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; color: var(--pri-soft);
  margin-bottom: 10px;
}
.profile-name { font-size: 15px; font-weight: 600; color: var(--white); }
.profile-sub  { font-size: 12px; color: var(--slate); margin-top: 2px; margin-bottom: 14px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-box {
  background: var(--bg4); border-radius: 8px;
  padding: 8px 10px; text-align: center;
}
.stat-val { font-size: 16px; font-weight: 600; color: var(--white); }
.stat-lbl { font-size: 10px; color: var(--slate-dim); margin-top: 1px; }

.filter-section { margin-top: 1.5rem; }
.filter-label {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--slate-dim); margin-bottom: 10px;
}
.filter-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.f-chip {
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--bg3);
  font-size: 12px; color: var(--slate);
  cursor: pointer; transition: all .15s;
}
.f-chip:hover { border-color: var(--border-mid); color: var(--white); }
.f-chip.on { background: var(--pri-dim); border-color: var(--pri); color: var(--pri-soft); }

.summary-boxes { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 1.5rem; }
.sum-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 8px; text-align: center; }
.sum-n { font-size: 22px; font-weight: 600; }
.sum-l { font-size: 9px; color: var(--slate-dim); margin-top: 2px; }

/* ── Right panel: school cards ─── */
.right-panel { padding: 2.5rem clamp(1.5rem, 4vw, 3rem); }
.results-header { margin-bottom: 1.5rem; }
.results-header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--white); }
.results-header h1 em { font-style: italic; color: var(--pri-soft); }
.results-count { font-size: 13px; color: var(--slate); margin-top: 4px; }

.school-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); margin-bottom: 10px;
  overflow: hidden; transition: border-color .2s; cursor: pointer;
}
.school-card:hover { border-color: var(--border-mid); }
.school-card.reach  { border-left: 3px solid var(--red); }
.school-card.target { border-left: 3px solid var(--amber); }
.school-card.likely { border-left: 3px solid var(--green); }

.card-top {
  padding: 16px 20px;
  display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;
}
.card-left { flex: 1; }
.card-name-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 3px; }
.card-name { font-size: 15px; font-weight: 600; color: var(--white); }
.card-location { font-size: 12px; color: var(--slate-dim); margin-bottom: 10px; }
.insights { display: flex; gap: 6px; flex-wrap: wrap; }
.ins-pill { font-size: 11px; padding: 3px 8px; border-radius: 5px; }
.ip-good { background: var(--green-dim); color: var(--green); }
.ip-warn { background: var(--amber-dim); color: var(--amber); }
.ip-info { background: var(--pri-dim);   color: var(--pri-soft); }

.card-right { text-align: right; flex-shrink: 0; }
.card-pct { font-size: 28px; font-weight: 700; line-height: 1; }
.card-pct-label { font-size: 11px; color: var(--slate-dim); margin-top: 2px; }

.card-bar { height: 3px; background: var(--bg4); margin: 0 20px 0; border-radius: 2px; overflow: hidden; }
.card-bar-fill { height: 100%; border-radius: 2px; transition: width .8s ease; }

.card-metrics {
  display: flex; gap: 0; padding: 10px 20px 14px;
  border-top: 1px solid var(--border);
}
.cm-item { flex: 1; text-align: center; }
.cm-item + .cm-item { border-left: 1px solid var(--border); }
.cm-val { font-size: 12px; font-weight: 500; color: var(--white); }
.cm-lbl { font-size: 10px; color: var(--slate-dim); margin-top: 2px; }
.cm-bar { height: 2px; background: var(--bg4); border-radius: 1px; margin: 4px 8px 0; overflow: hidden; }
.cm-bar-fill { height: 100%; border-radius: 1px; }

.card-expand { display: none; border-top: 1px solid var(--border); padding: 16px 20px 20px; }
.school-card.open .card-expand { display: block; }
.expand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 14px; }
.expand-block label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--slate-dim); display: block; margin-bottom: 5px; }
.expand-block p { font-size: 13px; color: var(--slate); line-height: 1.65; }
.expand-block p strong { color: var(--white); font-weight: 500; }
.expand-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

.no-profile-state { text-align: center; padding: 5rem 2rem; }
.no-profile-state h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--white); margin-bottom: .75rem; }
.no-profile-state p { color: var(--slate); margin-bottom: 2rem; line-height: 1.7; }

@media (max-width: 900px) {
  .results-layout { grid-template-columns: 1fr; }
  .left-panel { display: none; }
}
@media (max-width: 600px) {
  .expand-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><span class="logo-dot"></span>UniJourney</a>
  <ul class="nav-links">
    <li><a href="results.html" style="color:var(--white);">My list</a></li>
    <li><a href="profile.html">Edit profile</a></li>
  </ul>
  <a href="profile.html" class="btn btn-primary btn-sm">Edit profile</a>
</nav>

<div class="results-layout">

  <!-- Left: profile summary + filters -->
  <aside class="left-panel" id="leftPanel">
    <div class="profile-card">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div class="profile-name" id="profileName">Loading...</div>
      <div class="profile-sub"  id="profileSub">—</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val" id="statSat">—</div><div class="stat-lbl">SAT</div></div>
        <div class="stat-box"><div class="stat-val" id="statGpa">—</div><div class="stat-lbl">GPA</div></div>
        <div class="stat-box"><div class="stat-val" id="statIelts">—</div><div class="stat-lbl">IELTS</div></div>
        <div class="stat-box"><div class="stat-val" id="statActs">—</div><div class="stat-lbl">Activities</div></div>
      </div>
    </div>

    <div class="summary-boxes">
      <div class="sum-box"><div class="sum-n reach" id="cntReach">—</div><div class="sum-l">Reach</div></div>
      <div class="sum-box"><div class="sum-n target" id="cntTarget">—</div><div class="sum-l">Target</div></div>
      <div class="sum-box"><div class="sum-n likely" id="cntLikely">—</div><div class="sum-l">Likely</div></div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Filter by tier</div>
      <div class="filter-chips">
        <div class="f-chip on" data-f="all"    onclick="setFilter('all')">All schools</div>
        <div class="f-chip"    data-f="reach"  onclick="setFilter('reach')">Reach</div>
        <div class="f-chip"    data-f="target" onclick="setFilter('target')">Target</div>
        <div class="f-chip"    data-f="likely" onclick="setFilter('likely')">Likely</div>
      </div>
    </div>

    <div class="filter-section" style="margin-top:1.25rem;">
      <a href="profile.html" class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:.5rem;">← Edit my profile</a>
    </div>
  </aside>

  <!-- Right: school list -->
  <div class="right-panel">
    <div id="pageContent">
      <div style="text-align:center;padding:4rem;color:var(--slate);">Loading your results...</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="api.js"></script>
<script>
let allResults = [];
let activeFilter = 'all';
let profile = null;

async function init() {
  // Load profile from server or localStorage
  profile = await loadProfile();
  if (!profile) {
    const local = localStorage.getItem('uj_profile_local');
    if (local) profile = JSON.parse(local);
  }

  if (!profile || (!profile.gpa && !profile.sat && !profile.act)) {
    document.getElementById('pageContent').innerHTML = `
      <div class="no-profile-state">
        <h2>No profile found</h2>
        <p>Complete your profile first so we can calculate your personalized school list and admission chances.</p>
        <a href="profile.html" class="btn btn-primary btn-lg">Build my profile →</a>
      </div>`;
    return;
  }

  // Populate sidebar
  const initials = ((profile.first_name||'?')[0]+(profile.last_name||'?'||'')[0]||'?').toUpperCase();
  document.getElementById('profileAvatar').textContent = initials;
  document.getElementById('profileName').textContent = profile.first_name ? `${profile.first_name}` + (profile.last_name ? ` ${profile.last_name}` : '') : 'Your profile';
  document.getElementById('profileSub').textContent = [profile.grade, profile.country, profile.major].filter(Boolean).join(' · ') || 'No details yet';
  document.getElementById('statSat').textContent   = profile.sat   || (profile.act ? `ACT ${profile.act}` : '—');
  document.getElementById('statGpa').textContent   = profile.gpa   ? parseFloat(profile.gpa).toFixed(1) : '—';
  document.getElementById('statIelts').textContent = profile.ielts ? parseFloat(profile.ielts).toFixed(1) : '—';
  document.getElementById('statActs').textContent  = (profile.activities||[]).filter(Boolean).length;

  // Calculate chances
  const unis = await getUniversities();
  allResults = unis.map(uni => {
    const { final, scores } = calcChance(uni, profile);
    return { uni, final, scores, tier: getTier(final) };
  }).sort((a,b) => b.final - a.final);

  document.getElementById('cntReach').textContent  = allResults.filter(r=>r.tier==='reach').length;
  document.getElementById('cntTarget').textContent = allResults.filter(r=>r.tier==='target').length;
  document.getElementById('cntLikely').textContent = allResults.filter(r=>r.tier==='likely').length;

  renderResults();
}

function renderResults() {
  const filtered = activeFilter === 'all' ? allResults : allResults.filter(r => r.tier === activeFilter);

  const alerts = [];
  if (!profile.sat && !profile.act) alerts.push({ type:'warn', text:'<strong>No test score on file.</strong> Taking the SAT (aim 1350+) could move you from reach to target at several schools.' });
  if (!profile.gpa) alerts.push({ type:'info', text:'<strong>GPA not entered.</strong> <a href="profile.html">Add your GPA</a> for more accurate chance scores.' });

  const alertsHtml = alerts.map(a => `<div class="alert alert-${a.type}"><span class="alert-dot"></span><div>${a.text}</div></div>`).join('');

  document.getElementById('pageContent').innerHTML = `
    <div class="results-header">
      <h1>Your <em>personalized</em> school list</h1>
      <div class="results-count" id="resultsCount">${filtered.length} schools · sorted by your chance</div>
    </div>
    ${alertsHtml}
    <div id="schoolList"></div>
    <p style="font-size:12px;color:var(--slate-dim);margin-top:2rem;line-height:1.6;">
      Chance scores are estimates based on your profile, historical data, and Common Data Set reports.
      Actual admission depends on essays, recommendations, and factors not captured here.
    </p>`;

  renderCards();
}

function renderCards() {
  const filtered = activeFilter === 'all' ? allResults : allResults.filter(r => r.tier === activeFilter);
  document.getElementById('resultsCount').textContent = `${filtered.length} schools · sorted by your chance`;

  document.getElementById('schoolList').innerHTML = filtered.map(r => {
    const u = r.uni;
    const tc = r.tier === 'reach' ? 'var(--red)' : r.tier === 'target' ? 'var(--amber)' : 'var(--green)';
    const insights = [
      u.acceptance_rate < 0.15 ? {t:'ip-warn',l:'Highly selective'} : null,
      u.acceptance_rate > 0.5  ? {t:'ip-good',l:'Accessible'} : null,
      u.ielts_min <= 6.5       ? {t:'ip-good',l:'IELTS 6.5+'} : {t:'ip-warn',l:'IELTS 7.0+'},
    ].filter(Boolean).slice(0,3);

    const insHtml = insights.map(i => `<span class="ins-pill ${i.t}">${i.l}</span>`).join('');
    const metricBar = (v) => {
      const c = v>=70?'var(--green)':v>=50?'var(--amber)':'var(--red)';
      return `<div class="cm-bar"><div class="cm-bar-fill" style="width:${v}%;background:${c};"></div></div>`;
    };

    return `
    <div class="school-card ${r.tier}" id="card-${u.id}" onclick="toggleCard('${u.id}')">
      <div class="card-top">
        <div class="card-left">
          <div class="card-name-row">
            <span class="card-name">${u.name}</span>
            <span class="badge-${r.tier}">${r.tier}</span>
          </div>
          <div class="card-location">${u.city}, ${u.state} · ${u.type} · ${Math.round(u.acceptance_rate*100)}% admit rate</div>
          <div class="insights">${insHtml}</div>
        </div>
        <div class="card-right">
          <div class="card-pct" style="color:${tc};">${r.final}%</div>
          <div class="card-pct-label">your chance</div>
          <a href="university.html?id=${u.id}" class="btn btn-sm btn-ghost" style="margin-top:8px;" onclick="event.stopPropagation()">Full details →</a>
        </div>
      </div>
      <div class="card-bar"><div class="card-bar-fill" style="width:${r.final}%;background:${tc};"></div></div>
      <div class="card-metrics">
        <div class="cm-item"><div class="cm-val">${Math.round(r.scores.sat)}%</div><div class="cm-lbl">SAT/ACT</div>${metricBar(r.scores.sat)}</div>
        <div class="cm-item"><div class="cm-val">${Math.round(r.scores.gpa)}%</div><div class="cm-lbl">GPA</div>${metricBar(r.scores.gpa)}</div>
        <div class="cm-item"><div class="cm-val">${Math.round(r.scores.ielts)}%</div><div class="cm-lbl">IELTS</div>${metricBar(r.scores.ielts)}</div>
        <div class="cm-item"><div class="cm-val">${Math.round(r.scores.essay)}%</div><div class="cm-lbl">Essay</div>${metricBar(r.scores.essay)}</div>
        <div class="cm-item"><div class="cm-val">${Math.round(r.scores.ec)}%</div><div class="cm-lbl">ECs</div>${metricBar(r.scores.ec)}</div>
      </div>
      <div class="card-expand">
        <div class="expand-grid">
          <div class="expand-block"><label>Why it fits you</label><p>${u.whyFit}</p></div>
          <div class="expand-block"><label>Financial aid</label><p>${u.aidNote}</p></div>
          <div class="expand-block"><label>Median admitted</label><p><strong>GPA ${u.gpa_avg}</strong> · <strong>SAT ${(u.sat_reading_25||0)+(u.sat_math_25||0)}–${(u.sat_reading_75||0)+(u.sat_math_75||0)}</strong><br>You: GPA ${profile.gpa||'—'} · SAT ${profile.sat||'—'}</p></div>
          <div class="expand-block"><label>Key action</label><p>${u.keyAction}</p></div>
        </div>
        <div class="expand-actions">
          <a href="university.html?id=${u.id}" class="btn btn-primary btn-sm" onclick="event.stopPropagation()">Full details & radar →</a>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();saveSchool('${u.id}','${u.name}',${r.final},'${r.tier}')">Save school</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) {
  document.getElementById('card-'+id).classList.toggle('open');
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.f-chip').forEach(c => c.classList.toggle('on', c.dataset.f === f));
  renderCards();
}

async function saveSchool(id, name, chance, tier) {
  try {
    await apiPost('/saved', { session_id: getSessionId(), school_id: id, school_name: name, chance, tier });
    toast(`${name} saved!`, 'success');
  } catch { toast('Could not save school', 'error'); }
}

init();
</script>
</body>
</html>
