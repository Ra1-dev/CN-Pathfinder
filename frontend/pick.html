<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UniJourney — Build Your List</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
.pick-layout{max-width:900px;margin:0 auto;padding:2.5rem clamp(1.5rem,5vw,3rem) 5rem;}
.pick-header{margin-bottom:2rem;}
.pick-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,3vw,2.2rem);font-weight:700;color:var(--white);margin-bottom:.5rem;}
.pick-header p{font-size:14px;color:var(--slate);line-height:1.7;max-width:560px;}

/* selected shelf at top */
.shelf{
  display:grid;grid-template-columns:repeat(5,1fr);gap:8px;
  margin-bottom:1.75rem;
}
.shelf-slot{
  background:var(--bg3);border:1.5px dashed var(--border);
  border-radius:12px;padding:12px 10px;text-align:center;
  min-height:96px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;position:relative;
}
.shelf-slot.filled{border-style:solid;border-color:var(--border-mid);background:var(--bg2);}
.shelf-num{font-size:10px;font-weight:700;color:var(--slate-dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
.shelf-name{font-size:11px;font-weight:500;color:var(--white);line-height:1.3;}
.shelf-pct{font-size:11px;margin-top:3px;}
.shelf-pct.reach{color:var(--red);}
.shelf-pct.target{color:var(--amber);}
.shelf-pct.likely{color:var(--green);}
.shelf-empty{font-size:11px;color:var(--slate-dim);}
.shelf-rm{position:absolute;top:5px;right:7px;background:none;border:none;color:var(--slate-dim);font-size:16px;cursor:pointer;line-height:1;padding:0;}
.shelf-rm:hover{color:var(--red);}

/* progress */
.pick-prog{margin-bottom:1.5rem;}
.pick-prog-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.pick-prog-fill{height:100%;background:var(--pri);border-radius:2px;transition:width .35s;}
.pick-prog-label{font-size:12px;color:var(--slate);margin-bottom:6px;display:flex;justify-content:space-between;}

/* filter */
.pick-filter{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}

/* cards */
.pick-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;margin-bottom:8px;
  transition:border-color .18s;
}
.pick-card.reach {border-left:3px solid var(--red);}
.pick-card.target{border-left:3px solid var(--amber);}
.pick-card.likely{border-left:3px solid var(--green);}
.pick-card.added{opacity:.4;pointer-events:none;}
.pc-body{padding:13px 16px;display:flex;align-items:center;gap:12px;}
.pc-info{flex:1;}
.pc-name{font-size:14px;font-weight:600;color:var(--white);margin-bottom:2px;}
.pc-meta{font-size:11px;color:var(--slate-dim);}
.pc-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.pc-pct{font-size:20px;font-weight:700;}
.pc-pct.reach{color:var(--red);}
.pc-pct.target{color:var(--amber);}
.pc-pct.likely{color:var(--green);}
.add-btn-pick{
  padding:8px 16px;border-radius:8px;
  background:var(--pri);color:#0A0B14;
  font-size:13px;font-weight:600;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:background .15s;
  white-space:nowrap;
}
.add-btn-pick:hover{background:var(--pri-deep);color:#fff;}

/* confirm bar */
.confirm-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);border-top:1px solid var(--border);
  padding:1rem 2rem;display:flex;align-items:center;
  justify-content:space-between;gap:1rem;z-index:50;
}
.confirm-info{font-size:13px;color:var(--slate);}
.confirm-info strong{color:var(--white);}
@media(max-width:700px){
  .shelf{grid-template-columns:repeat(3,1fr);}
  .pc-body{flex-wrap:wrap;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><span class="logo-dot"></span>UniJourney</a>
  <ul class="nav-links">
    <li><a href="results.html">← All results</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
  </ul>
</nav>

<div class="pick-layout">
  <div class="pick-header">
    <p class="eyebrow">Step 2 — Build your list</p>
    <h1>Pick your <em>5 schools</em></h1>
    <p>Choose any 5 universities from your results. Click <strong>+ Add</strong> on any school. Click × on a selected school to swap it out.</p>
  </div>

  <!-- shelf showing selected 5 -->
  <div class="shelf" id="shelf"></div>

  <!-- progress -->
  <div class="pick-prog">
    <div class="pick-prog-label">
      <span id="progLabel">0 of 5 selected</span>
      <span id="progHint" style="color:var(--pri-soft);"></span>
    </div>
    <div class="pick-prog-bar"><div class="pick-prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <!-- filter -->
  <div class="pick-filter">
    <div class="f-chip on" data-f="all"    onclick="setFilter('all')">All</div>
    <div class="f-chip"   data-f="reach"   onclick="setFilter('reach')">Reach</div>
    <div class="f-chip"   data-f="target"  onclick="setFilter('target')">Target</div>
    <div class="f-chip"   data-f="likely"  onclick="setFilter('likely')">Likely</div>
  </div>

  <div id="cardList"></div>
  <div style="height:80px;"></div>
</div>

<div class="confirm-bar">
  <div class="confirm-info" id="confirmInfo">Select 5 schools to continue</div>
  <button class="btn btn-primary" id="confirmBtn" disabled onclick="confirmList()">
    Save list → Dashboard
  </button>
</div>

<div id="toast"></div>
<script src="api.js"></script>
<script>
// Simple array of 5 selected results — index into allResults
let selected = [null, null, null, null, null]; // always exactly 5 slots
let allResults = [];
let activeFilter = 'all';

async function init() {
  const [unis, profile] = await Promise.all([
    getUniversities(),
    loadProfile().catch(() => null),
  ]);
  const prof = profile || JSON.parse(localStorage.getItem('uj_profile_local') || '{}');

  allResults = unis.map(uni => {
    const { final, scores } = calcChance(uni, prof);
    return { uni, final, scores, tier: getTier(final) };
  }).sort((a, b) => b.final - a.final);

  // Restore previously saved
  try {
    const saved = await apiGet('/saved/' + getSessionId());
    const slotOrder = ['dream','target_1','target_2','safe_1','safe_2'];
    saved.sort((a,b) => slotOrder.indexOf(a.slot) - slotOrder.indexOf(b.slot));
    saved.forEach((s, i) => {
      if (i >= 5) return;
      const r = allResults.find(r =>
        String(r.uni.scorecard_id) === String(s.school_id) ||
        r.uni.name === s.school_name
      );
      if (r) selected[i] = r;
    });
  } catch {}

  renderShelf();
  renderCards();
}

function getSelectedUniKeys() {
  return selected.filter(Boolean).map(r => uniKey(r.uni));
}

function uniKey(uni) {
  // Use name as the definitive unique key since IDs vary
  return uni.name;
}

function addSchool(idx) {
  const r = allResults[idx];
  if (!r) return;
  const key = uniKey(r.uni);

  // Don't add if already selected
  if (getSelectedUniKeys().includes(key)) {
    toast('Already in your list', 'error');
    return;
  }

  // Find first empty slot
  const emptyIdx = selected.findIndex(s => s === null);
  if (emptyIdx === -1) {
    toast('List is full — remove a school first', 'error');
    return;
  }

  selected[emptyIdx] = r;
  renderShelf();
  renderCards();
}

function removeSlot(slotIdx) {
  selected[slotIdx] = null;
  renderShelf();
  renderCards();
}

function renderShelf() {
  const bar = document.getElementById('shelf');
  bar.innerHTML = selected.map((r, i) => `
    <div class="shelf-slot ${r ? 'filled' : ''}">
      <div class="shelf-num">School ${i + 1}</div>
      ${r ? `
        <div class="shelf-name">${r.uni.name.split(' ').slice(0,3).join(' ')}</div>
        <div class="shelf-pct ${r.tier}">${r.final}%</div>
        <button class="shelf-rm" onclick="removeSlot(${i})">×</button>
      ` : `<div class="shelf-empty">Empty</div>`}
    </div>`).join('');

  const count = selected.filter(Boolean).length;
  document.getElementById('progFill').style.width = (count / 5 * 100) + '%';
  document.getElementById('progLabel').textContent = `${count} of 5 selected`;
  document.getElementById('progHint').textContent = count === 5 ? 'Ready to save!' : `${5 - count} more to go`;

  const ready = count === 5;
  document.getElementById('confirmBtn').disabled = !ready;
  document.getElementById('confirmInfo').innerHTML = ready
    ? '<strong>5 schools selected</strong> — save your list'
    : `Select <strong>${5 - count}</strong> more school${5 - count !== 1 ? 's' : ''} to continue`;
}

function renderCards() {
  const selectedKeys = getSelectedUniKeys();
  const filtered = activeFilter === 'all'
    ? allResults
    : allResults.filter(r => r.tier === activeFilter);

  document.getElementById('cardList').innerHTML = filtered.map((r, _) => {
    const realIdx = allResults.indexOf(r);
    const isAdded = selectedKeys.includes(uniKey(r.uni));
    const tc = r.tier === 'reach' ? 'var(--red)' : r.tier === 'target' ? 'var(--amber)' : 'var(--green)';

    return `<div class="pick-card ${r.tier} ${isAdded ? 'added' : ''}">
      <div class="pc-body">
        <div class="pc-info">
          <div class="pc-name">${r.uni.name}</div>
          <div class="pc-meta">${r.uni.city || ''}, ${r.uni.state || ''} · ${Math.round((r.uni.acceptance_rate || 0) * 100)}% admit · GPA avg ${r.uni.gpa_avg || '—'}</div>
        </div>
        <div class="pc-right">
          <div class="pc-pct ${r.tier}">${r.final}%</div>
          <button class="add-btn-pick" onclick="addSchool(${realIdx})" ${isAdded ? 'disabled' : ''}>
            ${isAdded ? '✓ Added' : '+ Add'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.f-chip').forEach(c => c.classList.toggle('on', c.dataset.f === f));
  renderCards();
}

async function confirmList() {
  document.getElementById('confirmBtn').disabled = true;
  document.getElementById('confirmBtn').textContent = 'Saving...';

  const slotKeys = ['dream', 'target_1', 'target_2', 'safe_1', 'safe_2'];

  try {
    try { await apiDelete('/saved/' + getSessionId()); } catch {}
    for (let i = 0; i < 5; i++) {
      const r = selected[i];
      if (!r) continue;
      await apiPost('/saved', {
        session_id:  getSessionId(),
        school_id:   String(r.uni.scorecard_id || r.uni.id || r.uni.name),
        school_name: r.uni.name,
        chance:      r.final,
        tier:        r.tier,
        slot:        slotKeys[i],
        scores:      r.scores,
      });
    }
    toast('List saved!', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 700);
  } catch (e) {
    toast('Error saving — please try again', 'error');
    document.getElementById('confirmBtn').disabled = false;
    document.getElementById('confirmBtn').textContent = 'Save list → Dashboard';
  }
}

init();
</script>
</body>
</html>
